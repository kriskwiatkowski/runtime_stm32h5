name: Build STM32 Firmware

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM GCC toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Install CMake and Ninja
        run: |
          sudo apt-get install -y cmake ninja-build

      - name: Configure and build all presets
        run: |
          cmake --preset stm32h5
          cmake --build --preset stm32h5
          cmake --preset stm32h5-minsizerel
          cmake --build --preset stm32h5-minsizerel
          cmake --preset stm32h5-reldebinfo
          cmake --build --preset stm32h5-reldebinfo

      - name: Package all presets with CPack
        run: |
          cpack --preset stm32h5
          cpack --preset stm32h5-minsizerel
          cpack --preset stm32h5-reldebinfo

      - name: Check firmware size
        run: |
          arm-none-eabi-size out/build/stm32h5/librtm_stm32h5.a
          arm-none-eabi-size out/build/stm32h5-minsizerel/librtm_stm32h5.a
          arm-none-eabi-size out/build/stm32h5-reldebinfo/librtm_stm32h5.a

      - name: Upload stm32h5 artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware-stm32h5
          path: |
            out/build/stm32h5/librtm_stm32h5.a

      - name: Upload stm32h5-minsizerel artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware-stm32h5-minsizerel
          path: |
            out/build/stm32h5-minsizerel/librtm_stm32h5.a

      - name: Upload stm32h5-reldebinfo artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware-stm32h5-reldebinfo
          path: |
            out/build/stm32h5-reldebinfo/librtm_stm32h5.a

      - name: Upload stm32h5 package artifacts
        uses: actions/upload-artifact@v3
        with:
          name: package-stm32h5
          path: |
            out/package/stm32h5/*

      - name: Upload stm32h5-minsizerel package artifacts
        uses: actions/upload-artifact@v3
        with:
          name: package-stm32h5-minsizerel
          path: |
            out/package/stm32h5-minsizerel/*

      - name: Upload stm32h5-reldebinfo package artifacts
        uses: actions/upload-artifact@v3
        with:
          name: package-stm32h5-reldebinfo
          path: |
            out/package/stm32h5-reldebinfo/*
