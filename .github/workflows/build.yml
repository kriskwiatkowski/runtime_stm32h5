name: Build STM32 Firmware

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi cmake ninja-build

      - name: Build all presets
        run: |
          cmake --preset stm32h5
          cmake --build --preset stm32h5
          cmake --preset stm32h5-minsizerel
          cmake --build --preset stm32h5-minsizerel
          cmake --preset stm32h5-reldebinfo
          cmake --build --preset stm32h5-reldebinfo

      - name: Package all presets with CPack
        run: |
          cpack --preset stm32h5
          cpack --preset stm32h5-minsizerel
          cpack --preset stm32h5-reldebinfo

      - name: Check firmware size
        run: |
          arm-none-eabi-size out/build/stm32h5/librtm_stm32h5.a
          arm-none-eabi-size out/build/stm32h5-minsizerel/librtm_stm32h5.a
          arm-none-eabi-size out/build/stm32h5-reldebinfo/librtm_stm32h5.a

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: out/package/**/*.tar.gz
